<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="H&#224;nh Tr&#236;nh Tho&#225;t Kh&#7887;i Hang &#272;&#7897;ng Plato - giao di&#7879;n React, Tailwind, shadcn-style"
    />
    <title>H&#224;nh Tr&#236;nh Tho&#225;t Kh&#7887;i Hang &#272;&#7897;ng Plato</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      const isGitHubPages = window.location.hostname.endsWith("github.io");
      const hasBuiltBundle = Array.from(document.scripts).some((scriptTag) => {
        const src = scriptTag.getAttribute("src") || "";
        return /assets\/index-.*\.js$/.test(src);
      });

      if (isGitHubPages && !hasBuiltBundle) {
        const currentPath = window.location.pathname;
        const normalizedPath = currentPath.endsWith("/")
          ? currentPath
          : `${currentPath}/`;

        if (!normalizedPath.endsWith("/dist/")) {
          window.location.replace(
            `${window.location.origin}${normalizedPath}dist/`
          );
        }
      }
    </script>
  </body>
</html>
